<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чек-лист ХЦ - Баранчик</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .day-active { background-color: #ea580c !important; color: white !important; shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="app-loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
        <div class="text-center">
            <div class="animate-spin text-4xl mb-2">🐑</div>
            <p class="text-slate-500 font-medium">Завантаження бази даних...</p>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">👨‍🍳</span>
                <div>
                    <h1 class="text-lg font-black text-slate-800 uppercase leading-none">Холодний Цех</h1>
                    <p class="text-xs text-slate-500 font-bold mt-1 uppercase tracking-wider">Баранчик Кременчук</p>
                </div>
            </div>
            <button id="admin-btn" onclick="toggleAdminMode()" class="px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-bold uppercase transition-all active:scale-95">
                🔒 Норми
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 mt-6">
        <div class="bg-white p-2 rounded-2xl shadow-sm mb-6 flex overflow-x-auto gap-1 no-scrollbar">
            <button onclick="selectDay(0)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Пн</button>
            <button onclick="selectDay(1)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Вт</button>
            <button onclick="selectDay(2)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Ср</button>
            <button onclick="selectDay(3)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Чт</button>
            <button onclick="selectDay(4)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Пт</button>
            <button onclick="selectDay(5)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Сб</button>
            <button onclick="selectDay(6)" class="day-btn flex-1 min-w-[60px] py-3 rounded-xl font-bold text-sm uppercase transition-all bg-slate-50 text-slate-500">Нд</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-8">
            <button onclick="exportToExcel(false)" class="bg-green-600 text-white p-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">📊 Excel День</button>
            <button onclick="exportToExcel(true)" class="bg-green-800 text-white p-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">📅 Excel Тиждень</button>
            <button onclick="window.print()" class="bg-blue-600 text-white p-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center gap-2">🖨️ Друк</button>
            <div class="bg-orange-100 text-orange-700 p-3 rounded-xl text-[10px] font-black uppercase flex items-center justify-center text-center">☁️ Синхронізація</div>
        </div>

        <div id="checklist-container"></div>
    </main>

    <div id="status-toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-slate-900 text-white text-sm font-bold shadow-2xl z-50 transition-all opacity-0 pointer-events-none"></div>
