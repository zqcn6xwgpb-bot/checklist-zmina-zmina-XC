<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ХЦ Баранчик - Чек-лист</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .day-active { background-color: #ea580c !important; color: white !important; }
        
        .critical-blink { 
            animation: blink-red 0.8s infinite alternate; 
            background-color: #dc2626 !important; 
            color: white !important;
        }
        @keyframes blink-red {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0.8; transform: scale(1.05); background-color: #991b1b !important; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #main-content { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-[999] px-6">
        <div class="text-6xl mb-4">🐑</div>
        <h2 class="text-white font-black text-xl uppercase mb-6 tracking-tight">Доступ: ХЦ Баранчик</h2>
        <div class="w-full max-w-[240px] space-y-4">
            <input type="tel" id="pass-input" autofocus placeholder="ПАРОЛЬ" 
                class="w-full bg-slate-800 text-white text-center text-3xl p-4 rounded-2xl outline-none border-2 border-slate-700 focus:border-orange-500 transition-all">
            <button onclick="checkAuth()" 
                class="w-full bg-orange-600 text-white py-4 rounded-2xl font-black uppercase text-sm active:scale-95 transition-all shadow-lg">Увійти</button>
        </div>
    </div>

    <header class="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-slate-800 uppercase text-sm tracking-tighter">ХЦ БАРАНЧИК <span class="text-orange-600">ЧЕК-ЛИСТ</span></h1>
            <button id="admin-btn" onclick="toggleAdmin()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all">🔒 Адмін</button>
        </div>
    </header>

    <main id="main-content" class="max-w-5xl mx-auto px-4 mt-6">
        <div id="days-row" class="flex gap-1 overflow-x-auto pb-4 no-scrollbar"></div>
        
        <button onclick="sendToTelegram()" class="w-full bg-sky-500 text-white p-4 rounded-3xl font-black text-[11px] uppercase shadow-md mb-8 active:scale-95 transition-all flex items-center justify-center gap-2">
            ✈️ ВІДПРАВИТИ: ХЦ ДОРОБИТИ ЗАВТРА
        </button>

        <div id="content" class="space-y-6"></div>

        <div class="mt-10 grid grid-cols-2 gap-3">
            <button onclick="exportExcel()" class="bg-white border p-4 rounded-2xl text-[10px] font-bold uppercase text-slate-400">📊 Excel</button>
            <button onclick="window.print()" class="bg-white border p-4 rounded-2xl text-[10px] font-bold uppercase text-slate-400">🖨️ Друк</button>
        </div>
    </main>

    <script>
        // --- КОНФІГ ---
        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        const PASS_GENERAL = "2024"; 
        const PASS_ADMIN = "3196";
        const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38"; 
        const TG_CHAT_ID = "-1002336484919";

        let data = {};
        let day = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let isAdmin = false;

        // ПЕРЕВІРКА ВХОДУ (Запускається першою)
        function checkAuth() {
            const val = document.getElementById('pass-input').value.trim();
            if (val === PASS_GENERAL) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initApp();
            } else {
                alert('Невірний пароль!');
                document.getElementById('pass-input').value = '';
            }
        }

        // Вхід по Enter
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });

        function initApp() {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            
            db.ref('checklist-data').on('value', snap => {
                data = snap.val() || {};
                render();
            });

            // Глобальні функції для бази
            window.saveData = () => db.ref('checklist-data').set(data);
        }

        function toggleAdmin() {
            if (!isAdmin) {
                if (prompt('Пароль адміністратора:') === PASS_ADMIN) isAdmin = true;
            } else { isAdmin = false; }
            render();
            document.getElementById('admin-btn').textContent = isAdmin ? '🔓 ГОТОВО' : '🔒 АДМІН';
        }

        function setDay(i) { day = i; render(); }

        function update(c, k, f, v) {
            const val = parseFloat(v) || 0;
            data[c][k][day][f] = val;
            data[c][k][day].toPrepare = Math.max(0, data[c][k][day].norm - data[c][k][day].remainder);
            window.saveData();
        }

        async function sendToTelegram() {
            const shortDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            let message = `🚀 *ХЦ доробити завтра (${shortDays[day]}):* \n━━━━━━━━━━━━━\n`;
            let hasItems = false;
            for (let c in data) {
                let section = `\n📂 *${c.toUpperCase()}*\n`;
                let itemsFound = false;
                for (let k in data[c]) {
                    if (k === "_init") continue;
                    const d = data[c][k][day];
                    if (d.toPrepare > 0) {
                        section += `• ${k.replace(/_/g, ' ')} ➜ *${d.toPrepare.toFixed(1)}*\n`;
                        itemsFound = true; hasItems = true;
                    }
                }
                if (itemsFound) message += section;
            }
            if (!hasItems) { alert("Немає позицій для доготування!"); return; }
            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
                alert("✅ Звіт відправлено!");
            } catch (e) { alert("Помилка відправки"); }
        }

        function addCategory() {
            const n = prompt('Назва нової категорії:');
            if(n) { data[n] = { "_init": true }; window.saveData(); }
        }

        function deleteCategory(c) {
            if(confirm(`Видалити ВСЮ категорію "${c}"?`)) { delete data[c]; window.saveData(); }
        }

        function addItem(cat) {
            const inputId = `in-${cat.replace(/\s+/g, '_')}`;
            const input = document.getElementById(inputId);
            const n = input.value.trim();
            if(n) {
                const k = n.replace(/\s+/g, '_');
                if(!data[cat]) data[cat] = {};
                data[cat][k] = Array(7).fill(0).map(() => ({norm:0, remainder:0, toPrepare:0}));
                if(data[cat]._init) delete data[cat]._init;
                window.saveData();
            }
        }

        function deleteItem(cat, key) {
            if(confirm('Видалити цей продукт?')) { delete data[cat][key]; window.saveData(); }
        }

        function render() {
            const shortDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            document.getElementById('days-row').innerHTML = shortDays.map((d, i) => `
                <button onclick="setDay(${i})" class="flex-1 min-w-[48px] py-3 rounded-2xl font-black text-[10px] uppercase transition-all ${i === day ? 'day-active' : 'bg-white border text-slate-300'}">${d}</button>
            `).join('');

            let h = isAdmin ? `<button onclick="addCategory()" class="w-full p-4 mb-6 bg-orange-100 text-orange-800 rounded-3xl font-black text-[11px] border-2 border-dashed border-orange-300 uppercase tracking-widest">➕ Додати Розділ</button>` : '';
            
            for(let c in data) {
                const catId = c.replace(/\s+/g, '_');
                h += `<div class="bg-white rounded-[32px] border border-slate-200 overflow-hidden shadow-sm mb-6">
                    <div class="bg-slate-800 text-white px-6 py-4 text-[11px] font-black uppercase flex justify-between items-center tracking-tighter">
                        <span>${c}</span>
                        ${isAdmin ? `<button onclick="deleteCategory('${c}')" class="bg-red-500/20 text-red-400 px-3 py-1 rounded-lg text-[9px]">ВИДАЛИТИ 🗑️</button>` : ''}
                    </div>
                    <table class="w-full text-xs">`;
                
                for(let k in data[c]) {
                    if (k === "_init") continue;
                    const d = data[c][k][day] || {norm:0, remainder:0, toPrepare:0};
                    const isCritical = d.norm > 0 && d.toPrepare > (d.norm * 0.5);
                    
                    h += `<tr class="border-b last:border-none">
                        <td class="p-4 font-bold text-slate-700 w-[45%] flex items-center gap-2">
                            ${isAdmin ? `<button onclick="deleteItem('${c}','${k}')" class="text-red-400">✕</button>` : ''}
                            <span class="leading-tight">${k.replace(/_/g, ' ')}</span>
                        </td>
                        <td class="p-1"><input type="number" value="${d.norm}" ${isAdmin?'':'readonly'} onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'" onchange="update('${c}','${k}','norm',this.value)" class="w-full p-2 text-center rounded-xl ${isAdmin?'bg-orange-50 font-bold border border-orange-200 text-orange-900':'text-slate-200 pointer-events-none'}"></td>
                        <td class="p-1"><input type="number" value="${d.remainder}" onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'" onchange="update('${c}','${k}','remainder',this.value)" class="w-full p-2 text-center rounded-xl border-2 border-slate-100 font-black focus:border-orange-500 outline-none"></td>
                        <td class="p-4 text-right">
                            <span class="px-3 py-2 rounded-xl font-black text-[10px] min-w-[40px] inline-block text-center ${d.toPrepare > 0 ? (isCritical ? 'critical-blink shadow-lg' : 'bg-orange-600 text-white shadow-sm') : 'bg-green-100 text-green-700'}">
                                ${Number(d.toPrepare).toFixed(1)}
                            </span>
                        </td>
                    </tr>`;
                }

                if(isAdmin) {
                    h += `<tr class="bg-slate-50/50"><td colspan="4" class="p-4 border-t border-slate-100">
                        <div class="flex gap-2">
                            <input type="text" id="in-${catId}" placeholder="Назва продукту..." class="flex-1 p-3 text-[11px] rounded-xl border outline-none focus:ring-2 focus:ring-orange-500">
                            <button onclick="addItem('${c}')" class="bg-slate-700 text-white px-5 py-3 rounded-xl text-[10px] font-black">ДОДАТИ</button>
                        </div>
                    </td></tr>`;
                }
                h += `</table></div>`;
            }
            document.getElementById('content').innerHTML = h;
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            let rows = [['Категорія', 'Продукт', 'Норма', 'Залишок', 'Доробити']];
            for(let c in data) for(let k in data[c]) {
                if(k==="_init") continue;
                const d = data[c][k][day];
                rows.push([c, k.replace(/_/g, ' '), d.norm, d.remainder, d.toPrepare]);
            }
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Звіт");
            XLSX.writeFile(wb, "ХЦ_Баранчик.xlsx");
        }
    </script>
</body>
</html>
