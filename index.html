<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чек-лист ХЦ - Баранчик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .day-active { background-color: #ea580c !important; color: white !important; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .save-flash { animation: flash 0.8s ease; }
        @keyframes flash { 50% { background-color: #f0fdf4; border-color: #22c55e; } }
        
        /* Пульсація для критичних позицій */
        .critical-alert { animation: pulse-red 1.5s infinite; background-color: #dc2626 !important; }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 6px rgba(220, 38, 38, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
    </style>
</head>
<body class="pb-20">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-[100] px-6 text-center">
        <div class="text-6xl mb-6">🐏</div>
        <h2 class="text-white font-black text-xl uppercase tracking-tighter mb-2">Доступ обмежено</h2>
        <p class="text-slate-400 text-xs mb-8 uppercase tracking-widest">Введіть загальний пароль кухні</p>
        <input type="password" id="general-pass-input" placeholder="••••" class="bg-slate-800 border-none text-white text-center text-2xl tracking-[1em] p-4 rounded-2xl w-full max-w-[200px] mb-4 focus:ring-2 focus:ring-orange-500 outline-none">
        <button onclick="checkGeneralAuth()" class="bg-orange-600 text-white w-full max-w-[200px] py-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all">Увійти</button>
    </div>

    <div id="loader" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50 hidden">
        <div class="text-4xl animate-bounce">🐑</div>
    </div>

    <header class="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-black text-slate-800 uppercase tracking-tighter leading-none text-lg">
                    ХЦ БАРАНЧИК <span class="text-orange-600 text-sm ml-1">ЧЕК-ЛИСТ</span>
                </h1>
                <p class="text-[9px] text-slate-400 font-bold uppercase mt-1 tracking-widest">Кухня • Робоча область</p>
            </div>
            <button id="admin-btn" onclick="toggleAdmin()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase transition-all active:scale-95">
                🔒 Адмін
            </button>
        </div>
    </header>

    <main id="main-ui" class="max-w-5xl mx-auto px-4 mt-6 blur-sm pointer-events-none transition-all duration-500">
        <div id="days-row" class="flex gap-1 overflow-x-auto pb-4 no-scrollbar"></div>
        
        <div id="admin-panel" class="hidden mb-6 p-4 bg-orange-50 border border-orange-200 rounded-2xl shadow-inner">
            <h3 class="font-black text-[10px] uppercase text-orange-800 mb-3">🛠️ Редагування структури</h3>
            <div class="flex gap-2">
                <input type="text" id="new-cat-name" placeholder="Нова категорія..." class="flex-1 p-3 text-xs rounded-xl border border-orange-100 outline-none">
                <button onclick="addCategory()" class="bg-orange-600 text-white px-5 py-3 rounded-xl text-[10px] font-bold uppercase">Додати</button>
            </div>
        </div>

        <div id="content" class="space-y-6"></div>

        <div class="mt-10 grid grid-cols-2 gap-3">
            <button onclick="exportExcel()" class="bg-white border border-slate-200 text-slate-700 p-4 rounded-2xl text-[10px] font-bold uppercase shadow-sm">📊 Excel</button>
            <button onclick="window.print()" class="bg-white border border-slate-200 text-slate-700 p-4 rounded-2xl text-[10px] font-bold uppercase shadow-sm">🖨️ Друк</button>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let data = {};
        let day = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let isAdmin = false;
        
        const LOGIN_PASS = "2024"; // ЗАГАЛЬНИЙ ПАРОЛЬ НА ВХІД
        const ADMIN_PASS = "3196"; // ПАРОЛЬ АДМІНІСТРАТОРА

        function checkGeneralAuth() {
            const val = document.getElementById('general-pass-input').value;
            if (val === LOGIN_PASS) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-ui').classList.remove('blur-sm', 'pointer-events-none');
                document.getElementById('loader').classList.remove('hidden');
                initFirebase();
            } else {
                alert('Невірний пароль кухні!');
                document.getElementById('general-pass-input').value = '';
            }
        }

        function initFirebase() {
            db.ref('checklist-data').on('value', (snap) => {
                data = snap.val() || {};
                document.getElementById('loader').style.display = 'none';
                render();
            });
        }

        function toggleAdmin() {
            if (!isAdmin) {
                if (prompt('Пароль адміністратора:') === ADMIN_PASS) {
                    isAdmin = true;
                    document.getElementById('admin-panel').classList.remove('hidden');
                    document.getElementById('admin-btn').textContent = "🔓 Готово";
                }
            } else {
                isAdmin = false;
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('admin-btn').textContent = "🔒 Адмін";
            }
            render();
        }

        function setDay(i) { day = i; render(); }

        function addCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            if (!name) return;
            data[name] = { "_init": true };
            save();
            document.getElementById('new-cat-name').value = '';
        }

        function addItem(cat) {
            const input = document.getElementById(`new-item-${cat.replace(/\s+/g, '_')}`);
            const itemName = input.value.trim();
            if (!itemName) return;
            const key = itemName.replace(/\s+/g, '_');
            if (!data[cat]) data[cat] = {};
            data[cat][key] = Array(7).fill(0).map(() => ({norm:0, remainder:0, toPrepare:0}));
            if (data[cat]["_init"]) delete data[cat]["_init"];
            save();
        }

        function deleteItem(cat, key) {
            if (confirm(`Видалити "${key.replace(/_/g, ' ')}"?`)) { delete data[cat][key]; save(); }
        }

        function deleteCategory(c) {
            if (confirm(`Видалити категорію "${c}"?`)) { delete data[c]; save(); }
        }

        function update(c, k, f, v, el) {
            const val = parseFloat(v) || 0;
            data[c][k][day][f] = val;
            data[c][k][day].toPrepare = Math.max(0, data[c][k][day].norm - data[c][k][day].remainder);
            save(el);
        }

        function save(el) {
            db.ref('checklist-data').set(data).then(() => {
                if(el) {
                    el.parentElement.classList.add('save-flash');
                    setTimeout(() => el.parentElement.classList.remove('save-flash'), 800);
                }
                render();
            });
        }

        function render() {
            const shortDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            document.getElementById('days-row').innerHTML = shortDays.map((d, i) => `
                <button onclick="setDay(${i})" class="flex-1 min-w-[45px] py-3 rounded-xl font-bold text-[10px] tracking-widest uppercase transition-all ${i === day ? 'day-active' : 'bg-white text-slate-400 border border-slate-100'}">
                    ${d}
                </button>
            `).join('');

            let h = '';
            for(let c in data) {
                const catKey = c.replace(/\s+/g, '_');
                h += `<div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm mb-6">
                    <div class="bg-slate-800 text-white px-5 py-3 text-[10px] font-black uppercase flex justify-between items-center">
                        <span>${c}</span>
                        ${isAdmin ? `<button onclick="deleteCategory('${c}')" class="text-red-400 text-[8px]">Видалити</button>` : ''}
                    </div>
                    <table class="w-full text-xs">`;
                
                for(let k in data[c]) {
                    if (k === "_init") continue;
                    const d = data[c][k][day] || {norm:0, remainder:0, toPrepare:0};
                    
                    // ЛОГІКА КРИТИЧНОГО ЗАЛИШКУ (якщо потрібно зробити > 50% від норми)
                    const isCritical = d.norm > 0 && d.toPrepare > (d.norm * 0.5);
                    
                    h += `<tr class="border-b border-slate-50 last:border-none ${d.toPrepare > 0 ? 'bg-orange-50/30' : ''}">
                        <td class="p-4 font-bold text-slate-700 w-1/2 flex items-start gap-2">
                            ${isAdmin ? `<button onclick="deleteItem('${c}','${k}')" class="text-red-400 mt-0.5">✕</button>` : ''}
                            <span class="leading-tight">${k.replace(/_/g, ' ')}</span>
                        </td>
                        <td class="p-1"><input type="number" value="${d.norm}" ${isAdmin?'':'readonly'} onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'" onchange="update('${c}','${k}','norm',this.value, this)" class="w-full p-2 text-center rounded-xl ${isAdmin?'bg-orange-50 border border-orange-100 font-bold text-orange-900':'text-slate-300 pointer-events-none'}"></td>
                        <td class="p-1"><input type="number" value="${d.remainder}" onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'" onchange="update('${c}','${k}','remainder',this.value, this)" class="w-full p-2 text-center rounded-xl border border-slate-200 font-black focus:ring-2 focus:ring-orange-500 outline-none"></td>
                        <td class="p-4 text-right">
                            <span class="px-3 py-1.5 rounded-xl font-black text-[10px] ${d.toPrepare > 0 ? (isCritical ? 'critical-alert text-white shadow-lg' : 'bg-orange-600 text-white shadow-md') : 'bg-green-100 text-green-700'}">
                                ${Number(d.toPrepare).toFixed(1)}
                            </span>
                        </td>
                    </tr>`;
                }

                if (isAdmin) {
                    h += `<tr><td colspan="4" class="p-3 bg-slate-50/50">
                        <div class="flex gap-2">
                            <input type="text" id="new-item-${catKey}" placeholder="Продукт..." class="flex-1 p-2 text-[10px] rounded-lg border border-slate-200">
                            <button onclick="addItem('${c}')" class="bg-slate-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">➕</button>
                        </div>
                    </td></tr>`;
                }
                h += `</table></div>`;
            }
            document.getElementById('content').innerHTML = h;
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            let rows = [['Категорія', 'Продукт', 'Норма', '
