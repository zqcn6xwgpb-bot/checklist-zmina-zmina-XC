<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чек-лист ХЦ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="status-overlay" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <div id="loader" class="text-4xl animate-bounce">🐑</div>
        <p id="status-text" class="text-slate-400 font-bold mt-4 uppercase text-xs tracking-widest">З'єднання з базою...</p>
        <div id="error-log" class="mt-4 p-4 bg-red-50 text-red-600 text-xs rounded-lg hidden max-w-xs overflow-auto"></div>
    </div>

    <header class="bg-white border-b p-4 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-slate-800 uppercase tracking-tighter">Холодний Цех</h1>
            <button onclick="window.toggleAdminMode()" class="bg-slate-800 text-white px-3 py-2 rounded-lg text-[10px] font-bold uppercase">🔒 Адмін</button>
        </div>
    </header>

    <main id="main-content" class="max-w-5xl mx-auto px-4 mt-6 opacity-0 transition-opacity duration-500">
        <div id="day-selector" class="flex gap-1 overflow-x-auto pb-4 mb-4"></div>
        <div id="checklist-container" class="space-y-6 pb-20"></div>
    </main>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Логування помилок на екран
        function logError(err) {
            const logDiv = document.getElementById('error-log');
            logDiv.classList.remove('hidden');
            logDiv.innerHTML += `<p>> ${err}</p>`;
            document.getElementById('status-text').textContent = "Помилка завантаження";
            document.getElementById('loader').innerHTML = "❌";
        }

        try {
            const firebaseConfig = {
                apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
                authDomain: "baranchik-checklist.firebaseapp.com",
                databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "baranchik-checklist",
                storageBucket: "baranchik-checklist.firebasestorage.app",
                messagingSenderId: "374378353806",
                appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const categories = {
                'ОВОЧІ': ['Огірок чищений', 'Помідор рожевий', 'Перець солодкий', 'Цибуля марс', 'Кінза зачищена', 'Шпинат', 'Картопля відварна', 'Морква печена'],
                'МЯСО': ['Яловичина відварна', 'Курка шашлик', 'Печінка куряча', 'Качка філе', 'Телятина'],
                'СИРИ': ['Сулугуні', 'Імеретинський', 'Бринза', 'Пармезан', 'Рікотта']
            };

            let localData = {};
            let selectedDay = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
            let adminMode = false;

            window.toggleAdminMode = () => {
                if (!adminMode && prompt('Пароль:') === '1234') adminMode = true;
                else adminMode = false;
                render();
            };

            window.updateVal = (cat, item, field, val) => {
                const num = parseFloat(val) || 0;
                localData[cat][item][selectedDay][field] = num;
                localData[cat][item][selectedDay].toPrepare = Math.max(0, localData[cat][item][selectedDay].norm - localData[cat][item][selectedDay].remainder);
                set(ref(db, 'checklist-data'), localData);
                render();
            };

            window.setDay = (i) => { selectedDay = i; render(); };

            function render() {
                const daysShort = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
                document.getElementById('day-selector').innerHTML = daysShort.map((d, i) => `
                    <button onclick="setDay(${i})" class="flex-1 min-w-[45px] py-3 rounded-xl font-bold text-xs uppercase ${i === selectedDay ? 'bg-orange-600 text-white shadow-lg' : 'bg-white text-slate-400 border'}">${d}</button>
                `).join('');

                let html = '';
                for (let cat in categories) {
                    html += `<div class="bg-white rounded-2xl border overflow-hidden shadow-sm mb-6">
                        <div class="bg-slate-800 text-white px-4 py-2 text-[10px] font-black uppercase tracking-widest">${cat}</div>
                        <table class="w-full text-xs">`;
                    categories[cat].forEach(item => {
                        const key = item.replace(/\s+/g, '_');
                        const d = localData[cat]?.[key]?.[selectedDay] || {norm:0, remainder:0, toPrepare:0};
                        html += `<tr class="border-b last:border-none">
                            <td class="p-3 font-bold text-slate-700">${item}</td>
                            <td class="p-1"><input type="number" value="${d.norm}" ${adminMode?'':'readonly'} onchange="updateVal('${cat}','${key}','norm',this.value)" class="w-full p-2 text-center rounded bg-${adminMode?'orange-50':'transparent text-slate-300'}"></td>
                            <td class="p-1"><input type="number" value="${d.remainder}" onchange="updateVal('${cat}','${key}','remainder',this.value)" class="w-full p-2 text-center rounded border font-bold"></td>
                            <td class="p-3 text-center"><span class="px-2 py-1 rounded font-black ${d.toPrepare>0?'bg-orange-600 text-white':'bg-green-100 text-green-700'}">${d.toPrepare.toFixed(1)}</span></td>
                        </tr>`;
                    });
                    html += `</table></div>`;
                }
                document.getElementById('checklist-container').innerHTML = html;
            }

            // ПІДКЛЮЧЕННЯ
            onValue(ref(db, 'checklist-data'), (snap) => {
                if (snap.exists()) {
                    localData = snap.val();
                } else {
                    // Створення структури
                    for (let cat in categories) {
                        localData[cat] = {};
                        categories[cat].forEach(item => {
                            localData[cat][item.replace(/\s+/g, '_')] = Array(7).fill(0).map(() => ({norm:0, remainder:0, toPrepare:0}));
                        });
                    }
                    set(ref(db, 'checklist-data'), localData);
                }
                document.getElementById('status-overlay').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                render();
            }, (error) => {
                logError("Firebase Error: " + error.message);
            });

        } catch (e) {
            logError("System Error: " + e.message);
        }
    </script>
</body>
</html>
