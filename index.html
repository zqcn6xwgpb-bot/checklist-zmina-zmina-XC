<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ХЦ "Чек-лист заготовок"</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #18181f; --border: #252530; 
            --accent: #f97316; --text: #e8e8f0; --text-dim: #5a5a70;
            --lvl-green: #22c55e; --lvl-purple: #a855f7; --lvl-orange: #f97316; --lvl-red: #ef4444;
        }
        .light-theme {
            --bg: #f4f4f9; --surface: #ffffff; --surface2: #fdfdfd; --border: #e0e0e6; 
            --accent: #f97316; --text: #1a1a1a; --text-dim: #7a7a8a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Syne', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; margin: 0; overflow-x: hidden; }
        
        /* Прибираємо спінери (стрілочки) */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Екран авторизації */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .auth-input { width: 280px; background: var(--surface); border: 1px solid var(--border); color: var(--text); text-align: center; font-size: 32px; padding: 15px; border-radius: 20px; outline: none; margin-bottom: 25px; font-family: 'JetBrains Mono'; letter-spacing: 0.3em; pointer-events: none; }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 280px; }
        .num-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 24px; font-family: 'JetBrains Mono'; padding: 22px; border-radius: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .num-btn:active { background: var(--accent); color: white; transform: scale(0.92); }

        header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40; padding: 12px 20px; }
        .header-inner { max-width: 860px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 860px; margin: 0 auto; padding: 20px 16px; }

        .tg-btn { width: 100%; background: #0088cc; color: white; font-weight: 800; padding: 18px; border-radius: 18px; border: none; cursor: pointer; margin-bottom: 25px; text-transform: uppercase; font-size: 11px; box-shadow: 0 8px 24px rgba(0,0,136,0.15); }

        .category-block { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 20px; }
        .category-header { padding: 14px 20px; background: var(--surface2); color: var(--accent); font-family: 'JetBrains Mono'; font-weight: 700; text-transform: uppercase; font-size: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { font-family: 'JetBrains Mono'; font-size: 8px; color: var(--text-dim); text-transform: uppercase; padding: 10px 4px; }
        td { padding: 12px 4px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .item-cell { padding-left: 16px; width: 42%; }
        .marker-cell { width: 33%; text-align: center; }
        .input-cell { width: 25%; padding-right: 12px; }

        input[type="number"] {
            width: 100%; height: 48px; text-align: center; border-radius: 12px; font-family: 'JetBrains Mono'; font-weight: 700; border: 1px solid transparent; outline: none; background: rgba(128,128,128,0.1); color: var(--text); font-size: 18px;
        }
        
        /* Маркери у вільному полі */
        .marker-box { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 85px; margin: 0 auto; }
        .m-btn { width: 100%; height: 20px; border-radius: 6px; opacity: 0.1; border: 1px solid transparent; cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center; font-size: 7px; font-weight: 900; color: white; text-transform: uppercase; }
        .m-btn.active { opacity: 1; border-color: white; }
        .m-green { background-color: var(--lvl-green); }
        .m-orange { background-color: var(--lvl-orange); }
        .m-red { background-color: var(--lvl-red); }

        .bg-lvl-green { background-color: var(--lvl-green) !important; color: #000 !important; }
        .bg-lvl-purple { background-color: var(--lvl-purple) !important; color: #fff !important; }
        .bg-lvl-orange { background-color: var(--lvl-orange) !important; color: #000 !important; }
        .bg-lvl-red { background-color: var(--lvl-red) !important; color: #fff !important; }

        .item-name { font-size: 14px; font-weight: 800; line-height: 1.2; word-break: break-word; margin-bottom: 2px; }
        .norm-display { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); }
        .norm-val { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body class="dark-theme">

    <div id="auth-screen">
        <div style="font-size: 50px; margin-bottom: 10px;">📋</div>
        <div class="font-bold uppercase tracking-widest mb-4 text-center">ХЦ "Чек-лист"</div>
        <input type="password" id="pass-display" class="auth-input" placeholder="••••" readonly>
        
        <div class="numpad">
            <button class="num-btn" onclick="pressNum('1')">1</button>
            <button class="num-btn" onclick="pressNum('2')">2</button>
            <button class="num-btn" onclick="pressNum('3')">3</button>
            <button class="num-btn" onclick="pressNum('4')">4</button>
            <button class="num-btn" onclick="pressNum('5')">5</button>
            <button class="num-btn" onclick="pressNum('6')">6</button>
            <button class="num-btn" onclick="pressNum('7')">7</button>
            <button class="num-btn" onclick="pressNum('8')">8</button>
            <button class="num-btn" onclick="pressNum('9')">9</button>
            <button class="num-btn text-red-500 font-bold" onclick="clearNum()">C</button>
            <button class="num-btn" onclick="pressNum('0')">0</button>
            <button class="num-btn text-blue-400" onclick="backspaceNum()">←</button>
        </div>
    </div>

    <div id="app" style="display: none;">
        <header>
            <div class="header-inner">
                <div>
                    <div class="font-bold uppercase text-[10px] opacity-50 tracking-widest">Чек-лист заготовок</div>
                    <div id="target-day-info" style="color: var(--accent); font-weight: 800; font-size: 12px; text-transform: uppercase;"></div>
                </div>
                <div class="flex gap-2">
                    <button class="p-2 bg-zinc-800 rounded-lg" onclick="document.body.classList.toggle('light-theme')">☀️</button>
                    <button id="admin-btn" class="p-2 bg-zinc-800 rounded-lg" onclick="toggleAdmin()">🔒</button>
                </div>
            </div>
        </header>

        <main>
            <button class="tg-btn" onclick="sendToTelegram()">✈️ ВІДПРАВИТИ ЗВІТ</button>
            <div id="content"></div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        const PASS_GENERAL = "2024", PASS_ADMIN = "3196";
        const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38", TG_CHAT = "-1002336484919", THREAD = 15;
        const DB_KEY = "checklist-data-v2"; 

        let data = {}, isAdmin = false, currentPass = "";

        function pressNum(num) {
            currentPass += num; document.getElementById('pass-display').value = currentPass;
            if (currentPass === PASS_GENERAL) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                init();
            } else if (currentPass.length >= 4 && currentPass !== PASS_GENERAL) { 
                setTimeout(clearNum, 300); 
            }
        }
        function clearNum() { currentPass = ""; document.getElementById('pass-display').value = ""; }
        function backspaceNum() { currentPass = currentPass.slice(0, -1); document.getElementById('pass-display').value = currentPass; }

        function init() {
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            firebase.database().ref(DB_KEY).on('value', snap => { data = snap.val() || {}; render(); });
            const days = ['Неділя', 'Понеділок', 'Вівторок', 'Середа', 'Четвер', 'П’ятниця', 'Субота'];
            const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('target-day-info').textContent = "План на: " + days[tomorrow.getDay()];
        }

        function isTomorrowWeekend() { const t = new Date(); t.setDate(t.getDate() + 1); return [0, 5, 6].includes(t.getDay()); }

        function toggleAdmin() {
            const p = prompt('Код адміна:');
            if (p === PASS_ADMIN) isAdmin = !isAdmin;
            document.getElementById('admin-btn').textContent = isAdmin ? '🔓' : '🔒';
            render();
        }

        function update(c, i, f, v) {
            if(!data[c][i]) data[c][i] = { wd: 0, we: 0, stock: 0, marker: '' };
            data[c][i][f] = (f === 'stock' || f === 'wd' || f === 'we') ? parseFloat(v) || 0 : v;
            firebase.database().ref(DB_KEY).set(data);
        }

        function toggleMarker(c, i, color) {
            if(!data[c][i]) data[c][i] = { wd: 0, we: 0, stock: 0, marker: '' };
            data[c][i].marker = data[c][i].marker === color ? '' : color;
            firebase.database().ref(DB_KEY).set(data);
        }

        function getLvl(stock, norm) {
            if (!norm || norm <= 0 || stock === undefined || stock === '') return '';
            const p = (stock / norm) * 100;
            if (p >= 80) return 'bg-lvl-green';
            if (p >= 50) return 'bg-lvl-purple';
            if (p >= 40) return 'bg-lvl-orange';
            return 'bg-lvl-red';
        }

        function render() {
            const container = document.getElementById('content');
            const we = isTomorrowWeekend();
            let h = isAdmin ? `<button onclick="addCat()" class="w-full p-4 border-dashed border border-zinc-600 rounded-xl mb-4 text-[10px] uppercase tracking-widest">+ Новий Розділ</button>` : '';

            for (let c in data) {
                h += `<div class="category-block">
                    <div class="category-header"><span>${c}</span> ${isAdmin ? `<button onclick="delCat('${c}')">✕</button>` : ''}</div>
                    <table>
                        <thead><tr>
                            <th class="item-cell" style="text-align:left">Товар / Норма</th>
                            <th class="marker-cell">Статус</th>
                            <th class="input-cell">Залишок</th>
                            ${isAdmin ? '<th style="width:50px"></th>' : ''}
                        </tr></thead><tbody>`;

                for (let i in data[c]) {
                    if(i === "_init") continue;
                    const item = data[c][i];
                    const targetNorm = we ? (item.we || 0) : (item.wd || 0);
                    const colorClass = getLvl(item.stock, targetNorm);
                    const m = item.marker || '';

                    h += `<tr>
                        <td class="item-cell">
                            <div class="item-name">${i.replace(/_/g, ' ')}</div>
                            <div class="norm-display">План: <span class="norm-val">${targetNorm}</span></div>
                        </td>
                        <td class="marker-cell">
                            <div class="marker-box">
                                <div onclick="toggleMarker('${c}','${i}','green')" class="m-btn m-green ${m==='green'?'active':''}">ОК</div>
                                <div onclick="toggleMarker('${c}','${i}','orange')" class="m-btn m-orange ${m==='orange'?'active':''}">УВАГА</div>
                                <div onclick="toggleMarker('${c}','${i}','red')" class="m-btn m-red ${m==='red'?'active':''}">РОБИ</div>
                            </div>
                        </td>
                        <td class="input-cell">
                            <input type="number" class="${colorClass}" value="${item.stock || ''}" placeholder="0" onchange="update('${c}','${i}','stock',this.value)">
                        </td>
                        ${isAdmin ? `<td class="pr-2 text-right">
                             <div class="flex flex-col gap-1 items-end">
                                <input type="number" value="${item.wd}" onchange="update('${c}','${i}','wd',this.value)" style="height:20px; font-size:9px; width:35px" placeholder="Б">
                                <input type="number" value="${item.we}" onchange="update('${c}','${i}','we',this.value)" style="height:20px; font-size:9px; width:35px" placeholder="В">
                                <button onclick="delItem('${c}','${i}')" class="text-red-500 text-[10px]">✕</button>
                             </div>
                        </td>` : ''}
                    </tr>`;
                }
                if (isAdmin) h += `<tr><td colspan="4" class="p-3 text-center"><button class="text-[9px] opacity-40 font-bold" onclick="addItem('${c}')">+ ТОВАР</button></td></tr>`;
                h += `</tbody></table></div>`;
            }
            container.innerHTML = h;
        }

        async function sendToTelegram() {
            const we = isTomorrowWeekend();
            const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
            let msg = `🚀 *ХЦ: ПЛАН НА ЗАВТРА*\n📅 *${tomorrow.toLocaleDateString('uk-UA')}*\n━━━━━━━━━━━━━\n`;
            let has = false;

            for (let c in data) {
                let sec = `\n📂 *${c.toUpperCase()}*\n`;
                let fnd = false;
                for (let i in data[c]) {
                    if(i === "_init") continue;
                    const d = data[c][i];
                    const norm = we ? d.we : d.wd;
                    const toPrep = Math.max(0, norm - d.stock);
                    const m = d.marker || '';
                    let line = "", icon = "";

                    if (m === 'red') { icon = "🔴"; line = `*ДОРОБИТИ!*`; }
                    else if (m === 'orange') { icon = "🟠"; line = `*УВАГА*`; }
                    else if (m === 'green') { icon = "🟢"; line = `У нормі`; }
                    else if (toPrep > 0 && d.stock !== '') {
                        icon = (d.stock/norm*100) >= 50 ? "🟣" : "🔴";
                        line = `Треба: *${toPrep.toFixed(1)}*`;
                    } else if (d.stock >= norm && d.stock !== '') { icon = "✅"; line = "Готово"; }

                    if (line) { sec += `${icon} ${i.replace(/_/g, ' ')}: ${line}\n`; fnd = true; has = true; }
                }
                if (fnd) msg += sec;
            }
            if (!has) return alert("Порожньо");
            try {
                const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: TG_CHAT, message_thread_id: THREAD, text: msg, parse_mode: 'Markdown' })
                });
                if(res.ok) alert("✅ Відправлено!");
            } catch(e) { alert("Помилка"); }
        }

        function addCat() { const n = prompt('Розділ:'); if(n) { data[n.toUpperCase()] = {_init:true}; firebase.database().ref(DB_KEY).set(data); } }
        function delCat(c) { if(confirm('Видалити?')) { delete data[c]; firebase.database().ref(DB_KEY).set(data); } }
        function addItem(c) { const n = prompt('Товар:'); if(n) { data[c][n.replace(/\s+/g, '_')] = {wd:0, we:0, stock:0, marker:''}; firebase.database().ref(DB_KEY).set(data); } }
        function delItem(c, i) { if(confirm('Видалити?')) { delete data[c][i]; firebase.database().ref(DB_KEY).set(data); } }
    </script>
</body>
</html>
