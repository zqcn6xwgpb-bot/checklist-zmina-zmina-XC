<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чек-лист ХЦ - Баранчик</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .day-active { background-color: #ea580c !important; color: white !important; }
        .critical-alert { animation: pulse-red 1.5s infinite; background-color: #dc2626 !important; color: white !important; }
        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(220, 38, 38, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
        }
    </style>
</head>
<body class="pb-20">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-[200] px-6">
        <div class="text-6xl mb-4">🐑</div>
        <h2 class="text-white font-black text-xl uppercase tracking-tighter mb-6">Доступ до ХЦ</h2>
        <input type="tel" id="pass-input" placeholder="ПАРОЛЬ" class="bg-slate-800 border-2 border-slate-700 text-white text-center text-2xl p-4 rounded-2xl w-full max-w-[200px] mb-4 focus:border-orange-500 outline-none">
        <button onclick="checkAuth()" class="bg-orange-600 text-white w-full max-w-[200px] py-4 rounded-2xl font-black uppercase text-xs tracking-widest active:scale-95 transition-all">Увійти</button>
    </div>

    <header class="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-black text-slate-800 uppercase tracking-tighter text-sm">ХЦ БАРАНЧИК <span class="text-orange-600">ЧЕК-ЛИСТ</span></h1>
            <button id="admin-btn" onclick="toggleAdmin()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase">🔒 Адмін</button>
        </div>
    </header>

    <main id="main-content" class="max-w-5xl mx-auto px-4 mt-6 opacity-0 transition-opacity duration-500">
        <div id="days-row" class="flex gap-1 overflow-x-auto pb-4"></div>
        <div id="content" class="space-y-6"></div>
        <div class="mt-10 grid grid-cols-2 gap-3">
            <button onclick="exportExcel()" class="bg-white border p-4 rounded-2xl text-[10px] font-bold uppercase">📊 Excel</button>
            <button onclick="window.print()" class="bg-white border p-4 rounded-2xl text-[10px] font-bold uppercase">🖨️ Друк</button>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let data = {};
        let day = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let isAdmin = false;

        // ПАРОЛІ
        const PASS_GENERAL = "2024"; 
        const PASS_ADMIN = "3196";

        function checkAuth() {
            const input = document.getElementById('pass-input').value.trim();
            if (input === PASS_GENERAL) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-content').classList.replace('opacity-0', 'opacity-100');
                loadData();
            } else {
                alert('Невірний пароль!');
                document.getElementById('pass-input').value = '';
            }
        }

        // Дозволяємо вхід через Enter
        document.getElementById('pass-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });

        function loadData() {
            db.ref('checklist-data').on('value', (snap) => {
                data = snap.val() || {};
                render();
            });
        }

        function toggleAdmin() {
            if (!isAdmin) {
                if (prompt('Пароль адміна:') === PASS_ADMIN) {
                    isAdmin = true;
                    render();
                }
            } else {
                isAdmin = false;
                render();
            }
            document.getElementById('admin-btn').textContent = isAdmin ? '🔓 Готово' : '🔒 Адмін';
        }

        function setDay(i) { day = i; render(); }

        function update(c, k, f, v) {
            const val = parseFloat(v) || 0;
            data[c][k][day][f] = val;
            data[c][k][day].toPrepare = Math.max(0, data[c][k][day].norm - data[c][k][day].remainder);
            db.ref('checklist-data').set(data);
        }

        function addCategory() {
            const n = prompt('Назва нової категорії:');
            if(n) { data[n] = { "_init": true }; db.ref('checklist-data').set(data); }
        }

        function addItem(cat) {
            const n = prompt('Назва продукту:');
            if(n) {
                const k = n.replace(/\s+/g, '_');
                if(!data[cat]) data[cat] = {};
                data[cat][k] = Array(7).fill(0).map(() => ({norm:0, remainder:0, toPrepare:0}));
                if(data[cat]._init) delete data[cat]._init;
                db.ref('checklist-data').set(data);
            }
        }

        function deleteItem(cat, key) {
            if(confirm('Видалити?')) { delete data[cat][key]; db.ref('checklist-data').set(data); }
        }

        function render() {
            const shortDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            document.getElementById('days-row').innerHTML = shortDays.map((d, i) => `
                <button onclick="setDay(${i})" class="flex-1 min-w-[45px] py-3 rounded-xl font-bold text-[10px] uppercase ${i === day ? 'day-active' : 'bg-white border'}">${d}</button>
            `).join('');

            let h = isAdmin ? `<button onclick="addCategory()" class="w-full p-3 mb-4 bg-orange-100 text-orange-800 rounded-xl font-bold text-[10px] border-2 border-dashed border-orange-300">➕ ДОДАТИ НОВУ КАТЕГОРІЮ</button>` : '';
            
            for(let c in data) {
                h += `<div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm mb-6">
                    <div class="bg-slate-800 text-white px-5 py-3 text-[10px] font-black uppercase flex justify-between items-center">
                        <span>${c}</span>
                        ${isAdmin ? `<button onclick="addItem('${c}')" class="bg-white/20 px-2 py-1 rounded">➕</button>` : ''}
                    </div>
                    <table class="w-full text-xs">`;
                
                for(let k in data[c]) {
                    if (k === "_init") continue;
                    const d = data[c][k][day] || {norm:0, remainder:0, toPrepare:0};
                    const isCritical = d.norm > 0 && d.toPrepare > (d.norm * 0.5);
                    
                    h += `<tr class="border-b border-slate-50 last:border-none">
                        <td class="p-4 font-bold text-slate-700 w-1/2 flex items-center gap-2">
                            ${isAdmin ? `<button onclick="deleteItem('${c}','${k}')" class="text-red-400">✕</button>` : ''}
                            ${k.replace(/_/g, ' ')}
                        </td>
                        <td class="p-1"><input type="number" value="${d.norm}" ${isAdmin?'':'readonly'} onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'" onchange="update('${c}','${k}','norm',this.value)" class="w-full p-2 text-center rounded-xl ${isAdmin?'bg-orange-50 font-bold border border-orange-100':'text-slate-300 pointer-events-none'}"></td>
                        <td class="p-1"><input type="number" value="${d.remainder}" onfocus="if(this.value==='0')this.value=''" onblur="if(this.value==='')this.value='0'" onchange="update('${c}','${k}','remainder',this.value)" class="w-full p-2 text-center rounded-xl border font-black focus:ring-2 focus:ring-orange-500 outline-none"></td>
                        <td class="p-4 text-right">
                            <span class="px-3 py-1.5 rounded-xl font-black text-[10px] ${d.toPrepare > 0 ? (isCritical ? 'critical-alert shadow-lg' : 'bg-orange-600 text-white') : 'bg-green-100 text-green-700'}">
                                ${Number(d.toPrepare).toFixed(1)}
                            </span>
                        </td>
                    </tr>`;
                }
                h += `</table></div>`;
            }
            document.getElementById('content').innerHTML = h;
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            let rows = [['Категорія', 'Продукт', 'Норма', 'Залишок', 'Доробити']];
            for(let c in data) for(let k in data[c]) {
                if(k==="_init") continue;
                const d = data[c][k][day];
                rows.push([c, k.replace(/_/g, ' '), d.norm, d.remainder, d.toPrepare]);
            }
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Звіт");
            XLSX.writeFile(wb, "ХЦ_Баранчик.xlsx");
        }
    </script>
</body>
</html>
