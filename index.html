<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ХЦ Баранчик - Чек-лист</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        
        .day-active { background-color: #ea580c !important; color: white !important; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3); }
        
        /* НОВИЙ ЕФЕКТ РОЗШИРЕННЯ ПРИ НАТИСКАННІ */
        input[type="number"] {
            transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            backface-visibility: hidden;
            touch-action: manipulation;
        }
        
        input[type="number"]:focus {
            transform: scale(1.3) translateY(-2px) !important; /* Сильне збільшення та підйом */
            z-index: 100 !important;
            position: relative;
            border-color: #ea580c !important;
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.2) !important;
            background-color: white !important;
            outline: none !important; /* ПРИБИРАЄМО СТАНДАРТНУ РАМКУ З ВІДЕО */
        }

        /* Щоб сусідні елементи не перекривали той, що в фокусі */
        td:has(input:focus) {
            z-index: 50;
            position: relative;
        }

        .critical-blink { 
            animation: blink-red 0.8s infinite alternate; 
            background-color: #dc2626 !important; 
            color: white !important;
        }
        @keyframes blink-red {
            from { transform: scale(1); background-color: #dc2626; }
            to { transform: scale(1.05); background-color: #991b1b; }
        }

        .category-header {
            background: linear-gradient(90deg, #1e293b 0%, #334155 100%);
            letter-spacing: 0.05em;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        #main-content { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="auth-screen" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-[999] px-4">
        <div class="text-7xl mb-6">🐑</div>
        <h2 class="text-white font-black text-2xl uppercase mb-2 tracking-tight">ХЦ БАРАНЧИК</h2>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em] mb-10">Система контролю залишків</p>
        
        <div class="w-full max-w-[320px] space-y-5">
            <input type="password" 
                   id="pass-input" 
                   inputmode="numeric" 
                   pattern="[0-9]*"
                   autocomplete="one-time-code" 
                   autofocus 
                   placeholder="PIN" 
                   class="w-full bg-slate-800 text-white text-center text-4xl py-6 rounded-[2rem] outline-none border-2 border-slate-700 focus:border-orange-500 transition-all tracking-[0.4em] shadow-inner">
            
            <button onclick="checkAuth()" 
                class="w-full bg-orange-600 text-white py-6 rounded-[2rem] font-black uppercase text-sm active:scale-95 transition-all shadow-2xl shadow-orange-900/40">
                Увійти
            </button>
        </div>
    </div>

    <header class="bg-white border-b sticky top-0 z-40 px-4 py-4 shadow-sm">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex flex-col">
                <h1 class="font-black text-slate-900 uppercase text-base tracking-tighter leading-none">ХЦ БАРАНЧИК</h1>
                <span class="text-[9px] font-bold text-orange-600 uppercase tracking-widest mt-1">Чек-лист заготівлі</span>
            </div>
            <button id="admin-btn" onclick="toggleAdmin()" class="bg-slate-100 text-slate-800 border border-slate-200 px-4 py-2 rounded-2xl text-[10px] font-bold uppercase transition-all">
                🔒 Адмін
            </button>
        </div>
    </header>

    <main id="main-content" class="max-w-5xl mx-auto px-4 mt-6">
        <div id="days-row" class="flex gap-2 overflow-x-auto pb-6 no-scrollbar"></div>
        
        <button onclick="sendToTelegram()" class="w-full bg-sky-500 text-white p-5 rounded-[2rem] font-black text-[12px] uppercase shadow-lg shadow-sky-200 mb-8 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
            <span>✈️</span> ВІДПРАВИТИ: ХЦ ДОРОБИТИ ЗАВТРА
        </button>

        <div id="content" class="space-y-8"></div>

        <div class="mt-12 grid grid-cols-2 gap-4">
            <button onclick="exportExcel()" class="bg-white border-2 border-slate-100 p-4 rounded-3xl text-[10px] font-bold uppercase text-slate-400">📊 Excel</button>
            <button onclick="window.print()" class="bg-white border-2 border-slate-100 p-4 rounded-3xl text-[10px] font-bold uppercase text-slate-400">🖨️ Друк</button>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDo0IvJJbBSXCs7u2rpZ8fHrwK4Nm5isFo",
            authDomain: "baranchik-checklist.firebaseapp.com",
            databaseURL: "https://baranchik-checklist-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "baranchik-checklist",
            appId: "1:374378353806:web:95ff4b94c14fad8bece5df"
        };

        const PASS_GENERAL = "2024"; 
        const PASS_ADMIN = "3196";
        const TG_TOKEN = "7906609865:AAGxiiMSSnJcShk5SoxE7eVItyqDcWvyE38"; 
        const TG_CHAT_ID = "-1002336484919";

        let data = {};
        let day = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;
        let isAdmin = false;

        function checkAuth() {
            if (document.getElementById('pass-input').value.trim() === PASS_GENERAL) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                initApp();
            } else { alert('Невірний PIN!'); document.getElementById('pass-input').value = ''; }
        }

        document.getElementById('pass-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAuth(); });

        function initApp() {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            db.ref('checklist-data').on('value', snap => { data = snap.val() || {}; render(); });
            window.saveData = () => db.ref('checklist-data').set(data);
        }

        function toggleAdmin() {
            if (!isAdmin && prompt('Введіть код адміністратора:') === PASS_ADMIN) isAdmin = true;
            else if (isAdmin) isAdmin = false;
            render();
            document.getElementById('admin-btn').textContent = isAdmin ? '🔓 ГОТОВО' : '🔒 АДМІН';
        }

        function setDay(i) { day = i; render(); }

        function update(c, k, f, v) {
            const val = parseFloat(v) || 0;
            data[c][k][day][f] = val;
            data[c][k][day].toPrepare = Math.max(0, data[c][k][day].norm - data[c][k][day].remainder);
            window.saveData();
        }

        async function sendToTelegram() {
            const shortDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            let message = `🚀 *ХЦ доробити завтра (${shortDays[day]}):* \n━━━━━━━━━━━━━\n`;
            let hasItems = false;
            for (let c in data) {
                let section = `\n📂 *${c.toUpperCase()}*\n`;
                let found = false;
                for (let k in data[c]) {
                    if (k === "_init") continue;
                    const d = data[c][k][day];
                    if (d.toPrepare > 0) {
                        section += `• ${k.replace(/_/g, ' ')} ➜ *${d.toPrepare.toFixed(1)}*\n`;
                        found = true; hasItems = true;
                    }
                }
                if (found) message += section;
            }
            if (!hasItems) { alert("Все готово!"); return; }
            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'Markdown' })
                });
                alert("✅ Відправлено!");
            } catch (e) { alert("Помилка!"); }
        }

        function addCategory() {
            const n = prompt('Назва розділу:');
            if(n) { data[n] = { "_init": true }; window.saveData(); }
        }

        function deleteCategory(c) { if(confirm('Видалити розділ?')) { delete data[c]; window.saveData(); } }

        function addItem(cat) {
            const input = document.getElementById(`in-${cat.replace(/\s+/g, '_')}`);
            if(input.value.trim()) {
                const k = input.value.trim().replace(/\s+/g, '_');
                data[cat][k] = Array(7).fill(0).map(() => ({norm:0, remainder:0, toPrepare:0}));
                if(data[cat]._init) delete data[cat]._init;
                window.saveData();
            }
        }

        function deleteItem(cat, key) { if(confirm('Видалити?')) { delete data[cat][key]; window.saveData(); } }

        function render() {
            const shortDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
            document.getElementById('days-row').innerHTML = shortDays.map((d, i) => `
                <button onclick="setDay(${i})" class="flex-1 min-w-[50px] py-4 rounded-2xl font-black text-[11px] uppercase transition-all ${i === day ? 'day-active' : 'bg-white text-slate-300 border border-slate-100'}">${d}</button>
            `).join('');

            let h = isAdmin ? `<button onclick="addCategory()" class="w-full p-4 mb-8 bg-white text-orange-600 rounded-[2rem] font-black text-[11px] border-2 border-dashed border-orange-200 uppercase tracking-widest transition-all">➕ Додати Новий Розділ</button>` : '';
            
            for(let c in data) {
                const catId = c.replace(/\s+/g, '_');
                h += `<div class="bg-white rounded-[2.5rem] border border-slate-200 overflow-hidden shadow-sm mb-8">
                    <div class="category-header text-white px-8 py-5 flex justify-between items-center">
                        <span class="text-[13px] font-black uppercase tracking-wider">${c}</span>
                        ${isAdmin ? `<button onclick="deleteCategory('${c}')" class="text-red-300 text-[9px] font-bold">🗑️ ВИДАЛИТИ</button>` : ''}
                    </div>
                    <table class="w-full text-xs">`;
                
                for(let k in data[c]) {
                    if (k === "_init") continue;
                    const d = data[c][k][day] || {norm:0, remainder:0, toPrepare:0};
                    const isCrit = d.norm > 0 && d.toPrepare > (d.norm * 0.5);
                    
                    h += `<tr class="border-b border-slate-50 last:border-none">
                        <td class="p-5 font-semibold text-slate-800 w-[45%]">
                            <div class="flex items-center gap-3">
                                ${isAdmin ? `<button onclick="deleteItem('${c}','${k}')" class="text-red-300">✕</button>` : ''}
                                <span class="leading-snug">${k.replace(/_/g, ' ')}</span>
                            </div>
                        </td>
                        <td class="p-1">
                            <input type="number" value="${d.norm}" ${isAdmin?'':'readonly'} onfocus="this.select()" onchange="update('${c}','${k}','norm',this.value)" class="w-full p-3 text-center rounded-2xl ${isAdmin?'bg-orange-50 font-black text-orange-900 border border-orange-100':'text-slate-200 pointer-events-none'}">
                        </td>
                        <td class="p-1">
                            <input type="number" value="${d.remainder}" onfocus="this.select()" onchange="update('${c}','${k}','remainder',this.value)" class="w-full p-3 text-center rounded-2xl border-2 border-slate-50 font-black text-slate-900 transition-all">
                        </td>
                        <td class="p-5 text-right">
                            <span class="px-4 py-2.5 rounded-2xl font-black text-[11px] min-w-[50px] inline-block text-center shadow-sm ${d.toPrepare > 0 ? (isCrit ? 'critical-blink' : 'bg-slate-800 text-white') : 'bg-green-100 text-green-700'}">
                                ${Number(d.toPrepare).toFixed(1)}
                            </span>
                        </td>
                    </tr>`;
                }

                if(isAdmin) {
                    h += `<tr class="bg-slate-50/50"><td colspan="4" class="p-5 border-t">
                        <div class="flex gap-3">
                            <input type="text" id="in-${catId}" placeholder="Назва позиції..." class="flex-1 p-4 text-[11px] rounded-2xl border-2 border-white focus:border-slate-300 outline-none transition-all">
                            <button onclick="addItem('${c}')" class="bg-slate-800 text-white px-6 py-4 rounded-2xl text-[10px] font-black uppercase">Додати</button>
                        </div>
                    </td></tr>`;
                }
                h += `</table></div>`;
            }
            document.getElementById('content').innerHTML = h;
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            let rows = [['Категорія', 'Продукт', 'Норма', 'Залишок', 'Доробити']];
            for(let c in data) for(let k in data[c]) {
                if(k==="_init") continue;
                const d = data[c][k][day];
                rows.push([c, k.replace(/_/g, ' '), d.norm, d.remainder, d.toPrepare]);
            }
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "Звіт");
            XLSX.writeFile(wb, "ХЦ_Баранчик_Звіт.xlsx");
        }
    </script>
</body>
</html>
